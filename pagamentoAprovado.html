    <title>LOCATEM</title>

<body>

    <main class="payment-success">

        <!-- TOPO / HERO -->
        <section class="hero">
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"

                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />

            </div>

            <h1 class="hero-title">Pagamento aprovado com sucesso</h1>
            <p class="hero-subtitle">Sua transação foi processada.</p>

            <p class="hero-price">R$ 380,00</p>

            <div class="hero-divider"></div>

                            fill="#1B6D24" />
                    </svg>
                </div>
                <p>
                    Seu aluguel será entregue em até 2 horas.
                </p>
            </div>

            <!-- INFOS -->
            <div class="details-list">
                <div class="detail-row">
                    <span class="label">Método de pagamento</span>
                    <span class="value"></span>
                </div>

                <div class="detail-row">
                    <span class="label">Data e Hora</span>
                    <span class="value"></span>
                </div>

                <div class="detail-row">
                    <span class="label">Usuário</span>
                    <span class="value">João Silva</span>
                </div>
            </div>

            <!-- CARD DO PRODUTO -->
            <!-- <article class="product-card">
                <img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&w=300&q=80"
                    alt="Furadeira de Impacto Industrial" />

                <div class="product-info">
                    <h2>Furadeira de Impacto Industrial</h2>
                    <p>Quantidade: 1 • Locação: 3 dias</p>
                </div>
            </article> -->

            <div class="lista-produtos-confirmacao"></div>

            <!-- AÇÕES -->
            <div class="actions">
                <a href="#" class="btn-primary">Ver detalhes do aluguel</a>
                <a href="./principalPage.html" class="btn-link">Voltar para a página inicial</a>
