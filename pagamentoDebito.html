<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/pagamentoDebito.css" />
    <link rel="stylesheet" href="./src/css/reset.css">
    <title>LOCATEM</title>
</head>

<body>
    <div class="app">

        <!-- HEADER -->
        <header class="topo">
            <div class="linha-topo">
                <a href="./principalPage.html" class="logo">
                    <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                    LOCATEM
                </a>

                <button class="chat">
                    <img src="./src/images/chat.png" alt="Chat">
                </button>
            </div>
        </header>

        <!-- CONTEÚDO -->
        <main class="pagamento-container">
            <section class="titulo-pagina">
                <button class="btn-voltar" aria-label="Voltar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
                    </svg>
                </button>
                <h1>Pagamento Cartão de Débito</h1>
            </section>



            <!-- FORMA DE PAGAMENTO -->

            <!-- BANCOS -->
            <section class="card">
                <h2>Selecione seu Banco</h2>

                <div class="grid-bancos">
                    <button type="button">Nubank</button>
                    <button type="button">Itaú</button>
                    <button type="button">Bradesco</button>
                    <button type="button">Santander</button>
                    <button type="button">Banco do Brasil</button>
                    <button type="button">Caixa</button>
                </div>
            </section>

            <!-- DADOS DO CARTÃO -->
            <section class="card">
                <div class="card-header">
                    <h2>Dados do Cartão de Débito</h2>
                    <span class="card-icon">💳</span>
                </div>

                <form class="form-cartao">
                    <div class="campo">
                        <label for="numeroCartao">Número do Cartão</label>
                        <input id="numeroCartao" type="text" placeholder="0000 0000 0000 0000" />
                    </div>

                    <div class="campo">
                        <label for="nomeTitular">Nome do Titular</label>
                        <input id="nomeTitular" type="text" placeholder="NOME COMO ESTÁ NO CARTÃO" />
                    </div>

                    <div class="linha-campos">
                        <div class="campo">
                            <label for="validade">Validade</label>
                            <input id="validade" type="text" placeholder="MM/AA" />
                        </div>

                        <div class="campo">
                            <label for="cvv">CVV</label>
                            <input id="cvv" type="text" placeholder="123" />
                        </div>
                    </div>

                    <div class="aviso-banco">
                        <span class="info-icon">i</span>
                        <p>Você será redirecionado para autenticação do seu banco para confirmar o pagamento</p>
                    </div>
                </form>
            </section>

            <!-- RESUMO -->
            <section class="card resumo-pedido">
                <h2>Resumo do Pedido</h2>

                <div class="linha-resumo">
                    <span>Subtotal</span>
                    <span>R$ 380,00</span>
                </div>

                <div class="linha-resumo">
                    <span>Frete</span>
                    <span class="gratis">Grátis</span>
                </div>

                <div class="linha-total">
                    <span>Total</span>
                    <span>R$ 380,00</span>
                </div>

                <div class="cupom-box">
                    <div class="input-cupom">
                        <span class="cupom-icon">🏷</span>
                        <input type="text" placeholder="Inserir código de cupom" />
                    </div>
                </div>

                <button class="btn-pagar" type="button">Pagar com Débito</button>

                <div class="seguranca">
                    <span>🔒</span>
                    <p>Pagamento 100% seguro</p>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
