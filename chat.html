<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCATEM</title>
    <link rel="shortcut icon" href="./src/images/LogoIcon.png" type="image/x-icon"/>
    <link rel="stylesheet" href="./src/css/reset.css">
     <!-- <link rel="stylesheet" href="./src/css/busca.css"> -->
    <link rel="stylesheet" href="./src/css/header style/header.css">
    <link rel="stylesheet" href="./src/css/chat.css">    
    
</head>

<body>
  <!-- HEADER
             <div class="app"> -->
    <div class="app">

      
        <!-- ============== -->
        <!-- HEADER MOBILE -->
        <!-- ============== -->
        <header class="header-mobile">
            <!-- LINHA SUPERIOR -->
            <div class="linha-topo-mobile">
                <!-- AGRUPAMENTO ESQUERDO -->
                <div class="lado-esquerdo">
                    <button class="menu-btn">
                        <img src="./src/images/menuHamburguer.png" alt="Menu" />
                    </button>

                    <a href="./principalPage.html" class="logo">
                        <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM" />
                        LOCATEM
                    </a>
                </div>

                <!-- DIREITA -->
                <a href="#" class="carrinho-btn">
                    <img src="./src/images/carrinho.svg" alt="Carrinho" />
                    <span class="quantidade-carrinho">2</span>
                </a>
            </div>

            <!-- Barra de pesquisa -->
            <form class="barra-pesquisa-mobile" id="searchFormMobile">
                <img src="./src/images/lupa.png" alt="Buscar" />
                <input type="search" placeholder="Qual ferramenta você precisa hoje?"
                    aria-label="Pesquisar ferramentas" 
                    id="searchInputMobile"/>
            </form>
        </header>

        <!-- =============== -->
        <!-- HEADER DESKTOP-->
        <!-- =============== -->
        <header class="header-desktop">
            <div class="linha-topo-desktop">
                <!-- Logo da LOCATEM com link para a página principal -->
                <a href="./principalPage.html" class="logo">
                    <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM" />
                    LOCATEM
                </a>

                <!-- Barra de pesquisa -->
                <form class="barra-pesquisa" id="searchForm">
                    <button type="submit" class="lupa-btn">
                        <img src="./src/images/lupa.png" alt="Buscar" />
                    </button>
                    <input type="search" placeholder="Qual ferramenta você precisa hoje?"
                        aria-label="Pesquisar ferramentas" id="searchInput" />
                </form>

                <!-- Botão de acesso ao chat -->
                <button class="chat">
                    <img src="./src/images/chat.png" alt="Chat" />
                </button>
            </div>
        </header>
      
   
  <main class="chat-container">

    <!-- Área principal -->
    <section class="chat-area">

      <!-- Topo do chat -->
      <div class="chat-header">
        <div class="infoUsuarios">
          <div class="avatar"></div>
          <h2>usuario</h2>
        </div>

        <div class="status">
          Online <span class="online-dot"></span>
        </div>
      </div>

      <!-- Mensagens -->
      <div class="messages">

        <!-- Mensagem recebida -->
        <div class="message received">
          <p>Conteúdo da mensagem</p>
          <span>Time</span>
        </div>

        <div class="message received small">
          <p>Conteúdo da mensagem</p>
          <span>Time</span>
        </div>

        <!-- Mensagens enviadas -->
        <div class="message sent">
          <p>Conteúdo da mensagem</p>
          <span>Time</span>
        </div>

        <div class="message sent small">
          <p>Conteúdo da mensagem</p>
          <span>Time</span>
        </div>

        <div class="message sent small">
          <p>Conteúdo da mensagem</p>
          <span>Time</span>
        </div>

      </div>

      <!-- Input -->
      <form class="chat-input">
        <input type="text" placeholder="Escreva sua mensagem">
        <button type="submit">
          ➤
        </button>
      </form>

    </section>

    <!-- Lista de conversas -->
    <aside class="sidebar">
        <h2>conversas</h2>
        <ul>
            <li>
                <div class="contato">
                    <div class="avatar"></div>

                    <div class="contact-info">
                    <h3>Marcos</h3>
                    </div>

                <span class="time">11:29</span>
            </li>
             <li>
                <div class="contato">
                    <div class="avatar"></div>

                    <div class="contact-info">
                    <h3>Marcos</h3>
                    </div>

                <span class="time">11:29</span>
                </div>
            </li>
             <li>
                <div class="contato">
                    <div class="avatar"></div>

                    <div class="contact-info">
                    <h3>Marcos</h3>
                    </div>

                <span class="time">11:29</span>
                </div>
            </li>

        

        </ul>
      
    </aside>

  </main>

    </div>

</body>
<script src="./src/js/busca.js"></script>
