<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCATEM</title>
    <link rel="shortcut icon" href="./src/images/LogoIcon.png" type="image/x-icon"/>
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/busca.css"> 
    <link rel="stylesheet" href="./src/css/responsivoBusca.css">  

</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <header>
            <div class="cabecario">

           
                 <div class="header-superior">
                    <div class="logo">
                        <a href="#">
                        <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                        LOCATEM
                        </a>
                    </div>

                    <!-- Barra de pesquisa -->
                    <form class="search-bar"> 
                        <img src="./src/images/lupa.png" alt="" class="search-icon" />
                        <input type="search" placeholder="Buscar Ferramentas" aria-label="Pesquisar ferramentas" />
                       
                    </form>

                    <button aria-label="Mensagens" class="chat">
                        <img src="./src/images/chat.png" alt="Chat">
                    </button>
               </div>

               <div class="header-inferior">
                    <nav class="navegacaoMenu">
                        <a href="#"><img src="./src/images/home.png" alt="">Início</a>
                        <a href="#"><img src="./src/images/carrinho.png" alt="">Carrinho</a>
                        <a href="#"><img src="./src/images/relogio.png" alt="">Histórico</a>
                        <a href="#"><img src="./src/images/calendario.png" alt="">Agendamento</a>
                        <a href="#"><img src="./src/images/notificacoes.png" alt="">Notificações</a>
                        <a href="#"><img src="./src/images/Star.png" alt="">Avaliações</a>
                        <a href="#"><img src="./src/images/suporte.png" alt="">Suporte</a>
                        <a href="./login.html"><img src="./src/images/usuario.png" alt="">Entrar</a>
                    </nav>
                </div>
           </div>
        </header>

     
        <aside class="sidebar">
            <div class="filtro"></div>
                <h2>Filtros</h2>
               
                <div class="filtro-categoria">
                    <hr>
                     <h3>Categoria</h3>
                    <ul>
                        <li>
                            <input type="checkbox" id="categoria1"><label for="categoria1">Ferramentas Elétricas</label>
                        </li>
                        <li>
                            <input type="checkbox" id="categoria2"><label for="categoria2">Ferramentas Manuais</label>
                        </li>
                        <li>
                            <input type="checkbox" id="categoria3"><label for="categoria3">Equipamentos de Jardinagem</label>
                        </li>
                        <li>
                            <input type="checkbox" id="categoria4"><label for="categoria4">Máquinas Pesadas</label>
                        </li>
                    </ul>
                </div>
                <div class="filtroMarca">
                    <hr>
                    <h3>Marca</h3>
                    <ul>
                        <form id="buscaMarca" action="#" method="get">
                            <input type="text" placeholder="Marca" aria-label="Buscar marca" name="marca">
                            <button type="submit" class="lupa-btn">
                                <img src="./src/images/lupa.png" alt="Buscar">
                            </button>                       
                        </form>

                        <li>
                            <input type="checkbox" id="marca1">
                            <label for="marca1">
                                Bosch</label></li>
                        <li>
                            <input type="checkbox" id="marca2">
                            <label for="marca2">Makita</label></li>
                        <li>
                            <input type="checkbox" id="marca3">
                            <label for="marca3">DeWalt</label></li>
                        <li>
                            <input type="checkbox" id="marca4">
                            <label for="marca4">Black & Decker</label></li>
                    </ul>
                </div>
    
                <div class="filtro-preco">
                    <h3>Faixa de Preço</h3>
                    <ul>
                        <li>
                            <input type="checkbox" id="preco1">
                            <label for="preco1">R$0 - R$50</label></li>
                        <li>
                            <input type="checkbox" id="preco2">
                            <label for="preco2">R$51 - R$100</label></li>
                        <li>
                            <input type="checkbox" id="preco3">
                            <label for="preco3">R$101 - R$200</label></li>
                        <li>
                            <input type="checkbox" id="preco4">
                            <label for="preco4">R$201+</label>
                        </li>
                    </ul>
                </div>
                <div>
                <button class="aplicar-filtros" onclick="AplicarFiltros">Pesquisar</button>
                </div>
            </div>
            </aside>
        <!-- BANNER -->
         <section>
            <div aria-label="Banner de anúncio">
                <div class="banner">
                    <div class="anuncio-img">
                        <img src="./src/images/anuncio locatem 1.png" alt="Anúncio 1">
                    </div>
                </div>
            </div>
         </section>
        <main>
              <div class="produtosPesquisa">
            <div class="ordenar">
                <h2>

                </h2>
            </div>
            <ul class="grid-produtos">
                 <li class="anuncio-card">
                    <div class="card-img">
                        <img src="./src/images/parafusadeira-furadeira-WAP.png" alt="Furadeira">
                    </div>

                    <div class="card-info">
                        <h3>Furadeira de Impacto WAP</h3>
                        <p>R$45,00<span>/dia</span></p>
                    </div>
                </li>
            </ul>
         </div>
        </main>

      
    </div>
</body>

<script src=""></script>

</html>
