<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCATEM</title>
    <!-- Reset CSS -->
    <link rel="stylesheet" href="./src/css/reset.css">
    <!-- CSS principal -->
    <link rel="stylesheet" href="./src/css/principalPage.css">
    <!-- CSS responsivo -->
    <link rel="stylesheet" href="./src/css/responsivoPrincipalPage.css">
    <!-- Fonte Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

    <link rel="icon" type="image" href="./src/images/LogoIcon.png">
</head>

<body>
    <!-- FAIXA VISUAL COM GRADIENTE -->
    <div class="faixa-topo">
        <!-- CABEÇALHO (navegação) -->
        <header class="header">
            <!-- Linha superior: logo, busca e chat -->
            <div class="header-top">


                <img src="./src/images/Logo com nome.png" alt="Logo LOCATEM" class="logo">
                <form class="search-bar" action="#" method="get">
                    <input type="text" placeholder="Pesquisar..." aria-label="Pesquisar">
                    <button type="submit" class="lupa-btn">
                        <img src="./src/images/lupa.png" alt="Buscar">
                    </button>
                </form>

                <button class="menu-toggle">☰</button>

                <img src="./src/images/chat.png" alt="Abrir chat" class="chat">
            </div>
            <!-- Menu principal -->
            <nav class="menu" aria-label="Menu principal">
                <div class="menu-content">
                    <a href="#">
                        <img src="./src/images/home (1).png" alt aria-hidden="true">
                        Início
                    </a>
                    <a href="#">
                        <img src="./src/images/carrinho.png" alt aria-hidden="true">
                        Carrinho
                    </a>
                    <a href="#">
                        <img src="./src/images/relogio.png" alt aria-hidden="true">
                        Histórico
                    </a>
                    <a href="#">
                        <img src="./src/images/calendario.png" alt aria-hidden="true">
                        Agendamento
                    </a>
                    <a href="#">
                        <img src="./src/images/notificacoes.png" alt aria-hidden="true">
                        Notificações
                    </a>
                    <a href="#">
                        <img src="./src/images/star.png" alt aria-hidden="true">
                        Avaliações
                    </a>
                    <a href="#">
                        <img src="./src/images/suporte.png" alt aria-hidden="true">
                        Suporte
                    </a>
                    <a href="#">
                        <img src="./src/images/usuario.png" alt aria-hidden="true">
                        Entrar
                    </a>
                </div>
            </nav>
        </header>
        <!-- PARTE AMARELA AINDA FAZ PARTE DA FAIXA -->
        <!-- CARROSSEL DE ANÚNCIOS -->
        <section class="carrossel">
            <div class="carrossel-imagens">
                <div class="carrossel_item ativo">
                    <div class="anuncio-img">
                        <img src="./src/images/anuncio locatem 1.png" alt="Anúncio 1">
                    </div>
                </div>
                <div class="carrossel_item">
                    <div class="anuncio-img">
                        <img src="./src/images/anuncio 2.png" alt="Anúncio 2">
                    </div>
                </div>
            </div>

            <div class="setas">
                <button class="seta-btn" id="antes">
                    &#10094
                </button>

                <button class="seta-btn" id="depois">
                    &#10095
                </button>
            </div>

            <div class="carrossel-indicadores">
                <div class="indicadores">
                    <div class="carrossel-indicador ativo"></div>
                    <div class="carrossel-indicador"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- FECHA faixa-topo -->
    <!-- CONTEÚDO REAL DA PÁGINA -->
    <main class="container">
        <!-- daqui pra baixo NÃO tem gradiente -->
        <h2 class="subtitulo" id="subtitulo">Ferramentas</h2>
        <!-- Categorias de ferramentas -->
        <div class="categorias-ferramentas">
            <div class="categoria">Furadeira</div>
            <div class="categoria">Parafusadeira</div>
            <div class="categoria">Lixadeira</div>
            <div class="categoria">Serra elétrica</div>
            <div class="categoria"></div>
            <div class="categoria"></div>
            <div class="categoria"></div>
            <div class="categoria"></div>
            <div class="categoria"></div>
            <div class="categoria"></div>
        </div>

        <!-- Cards de ferramentas -->
        <div class="ferramentas">

            <div class="ferramenta-card">
                <div class="card-img">
                    <img src="./src/images/parafusadeira-furadeira-WAP.webp" alt="Furadeira">
                </div>

                <div class="card-info">
                    <h3 class="nome">Furadeira de Impacto WAP</h3>
                    <p class="preco">R$45,00 <span>/dia</span></p>
                </div>
            </div>

            <div class="ferramenta-card">
                <div class="card-img">
                    <img src="./src/images/martelete.png" alt="Martelete">
                </div>

                <div class="card-info">
                    <h3 class="nome">Martelete Perfurador</h3>
                    <p class="preco">R$59,99 <span>/dia</span></p>
                </div>
            </div>

            <div class="ferramenta-card">
                <div class="card-img">
                    <img src="" alt="Lixadeira">
                </div>

                <div class="card-info">
                    <h3 class="nome">Lixadeira</h3>
                    <p class="preco">R$ <span>/dia</span></p>
                </div>
            </div>

            <div class="ferramenta-card">
                <div class="card-img">
                    <img src="" alt="Serra elétrica">
                </div>

                <div class="card-info">
                    <h3 class="nome">Serra elétrica</h3>
                    <p class="preco">R$ <span>/dia</span></p>
                </div>
            </div>

            <div class="ferramenta-card">
                <div class="card-img">
                    <img src="" alt="Parafusadeira">
                </div>

                <div class="card-info">
                    <h3 class="nome">Parafusadeira</h3>
                    <p class="preco">R$ <span>/dia</span></p>
                </div>
            </div>

        </div>
    </main>
    <script src="./src/js/principalPage.js"></script>

</body>

</html>
