<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCATEM</title>
    <link rel="shortcut icon" href="./src/images/LogoIcon.png" type="image/x-icon"/>
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/principalPage.css">
    <link rel="stylesheet" href="./src/css/responsivoPrincipalPage.css">

</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <header>
            <div class="logo">
                <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                LOCATEM
            </div>

            <!-- Barra de pesquisa desktop -->
            <form class="search-bar-desktop">
                <input type="search" placeholder="Pesquisar..." aria-label="Pesquisar ferramentas" />
                <button type="submit" class="lupa-btn">
                    <img src="./src/images/lupa.png" alt="Buscar">
                </button>
            </form>

            <button aria-label="Mensagens" class="chat">
                <img src="./src/images/chat.png" alt="Chat">
            </button>


        </header>

        <!-- Nav desktop fica abaixo da linha superior -->
        <nav class="navegacaoDesktop">
            <a href="#"><img src="./src/images/home.png" alt="">Início</a>
            <a href="#"><img src="./src/images/carrinho.png" alt="">Carrinho</a>
            <a href="#"><img src="./src/images/relogio.png" alt="">Histórico</a>
            <a href="#"><img src="./src/images/calendario.png" alt="">Agendamento</a>
            <a href="#"><img src="./src/images/notificacoes.png" alt="">Notificações</a>
            <a href="#"><img src="./src/images/Star.png" alt="">Avaliações</a>
            <a href="#"><img src="./src/images/suporte.png" alt="">Suporte</a>
            <a href="./login.html"><img src="./src/images/usuario.png" alt="">Entrar</a>
        </nav>

        <!-- BARRA DE BUSCA -->
        <div class="search-bar-carrinho">
            <form class="search-bar">
                <input type="search" placeholder="Pesquisar..." aria-label="Pesquisar ferramentas" />
                <button type="submit" class="lupa-btn">
                    <img src="./src/images/lupa.png" alt="Buscar">
                </button>
            </form>

            <button aria-label="Carrinho" class="carrinho">
                <img src="./src/images/carrinho.png" alt="Carrinho">
            </button>
        </div>

        <!-- BANNER -->
        <section aria-label="Banner de anúncio">
            <div class="banner">
                <div class="anuncio-img">
                    <img src="./src/images/anuncio locatem 1.png" alt="Anúncio 1">
                </div>

                <div class="anuncio-img">
                    <img src="" alt="Anúncio 2">
                </div>

                <div class="setas">
                    <button class="seta-btn" id="antes">
                        &#10094
                    </button>

                    <button class="seta-btn" id="depois">
                        &#10095
                    </button>
                </div>

                <div class="indicadores" role="tablist" aria-label="Slides do banner">
                    <span class="ativo" role="tab" aria-selected="true"></span>
                    <span role="tab" aria-selected="false"></span>
                </div>
            </div>
        </section>

        <!-- FERRAMENTAS -->
        <main>
            <h2>Ferramentas</h2>

            <!-- CATEGORIAS -->
            <ul class="categorias" aria-label="Categorias de ferramentas">
                <li><button>Furadeira</button></li>
                <li><button>Parafusadeira</button></li>
                <li><button>Lixadeira</button></li>
                <li><button>Serra elétrica</button></li>
                <li><button>Gerador</button></li>
            </ul>

            <!-- GRID DE ANÚNCIOS -->
            <ul class="anuncios" aria-label="Anúncios de ferramentas">
                <li class="anuncio-card">
                    <div class="card-img">
                        <img src="./src/images/parafusadeira-furadeira-WAP.png" alt="Furadeira">
                    </div>

                    <div class="card-info">
                        <h3>Furadeira de Impacto WAP</h3>
                        <p>R$45,00<span>/dia</span></p>
                    </div>
                </li>
                <li class="anuncio-card">
                    <div class="card-img">
                        <img src="" alt="">
                    </div>

                    <div class="card-info">
                        <h3>Nome</h3>
                        <p>R$<span>/dia</span></p>
                    </div>
                </li>
                <li class="anuncio-card">
                    <div class="card-img">
                        <img src="" alt="">
                    </div>

                    <div class="card-info">
                        <h3>Nome</h3>
                        <p>R$<span>/dia</span></p>
                    </div>
                </li>
                <li class="anuncio-card">
                    <div class="card-img">
                        <img src="" alt="">
                    </div>

                    <div class="card-info">
                        <h3>Nome</h3>
                        <p>R$<span>/dia</span></p>
                    </div>
                </li>
            </ul>
        </main>

        <!-- BOTTOM NAV -->
        <nav aria-label="Navegação principal" class="navegacaoMobile">
            <a href="#" class="ativo" aria-label="Início" aria-current="page">
                <img src="./src/images/home.png" alt="Início">
            </a>
            <a href="#" aria-label="Histórico">
                <img src="./src/images/relogio.png" alt="Histórico">
            </a>
            <a href="#" aria-label="Calendário">
                <img src="./src/images/calendario.png" alt="Agendamentos">
            </a>
            <a href="#" aria-label="Favoritos">
                <img src="./src/images/Star.png" alt="Favoritos">
            </a>
            <a href="./login.html" aria-label="Perfil">
                <img src="./src/images/usuario.png" alt="Usuário">
            </a>
        </nav>
    </div>
</body>

<script src="./src/js/principalPage.js"></script>

</html>
