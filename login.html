<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCATEM</title> <!-- Título exibido na aba do navegador -->

    <!-- Reset CSS (remove estilos padrão do navegador) -->
    <link rel="stylesheet" href="./src/css/reset.css" />

    <!-- CSS específico para responsividade -->
    <link rel="stylesheet" href="./src/css/responsivoLogin.css" />

    <!-- CSS principal da tela de login -->
    <link rel="stylesheet" href="./src/css/login.css" />
</head>

<body>
    <!-- HEADER COM LOGO -->
    <header>
        <!-- Logo do sistema -->
        <img src="./src/images/Logo com nome.png" alt="Logo LOCATEM" class="logo" />
    </header>

    <main>
        <!-- BLOCO SUPERIOR COM TÍTULO -->
        <div class="topo">
            <h1 class="titulo">Entre na sua conta</h1>
            <p class="paragrafo">Acesse sua conta para continuar</p>
        </div>

        <!-- CARD CENTRAL DO LOGIN -->
        <div class="card">

            <!-- FORMULÁRIO DE LOGIN -->
            <form action="#" method="post">
                <!-- action="#" ainda não envia para backend -->
                <!-- method="post" indica envio seguro de dados -->

                <!-- CAMPO EMAIL -->
                <div>
                    <label for="email" class="label">E-mail</label>
                    <!-- 'for' conecta label ao input (acessibilidade) -->

                    <input type="email" id="email" name="email" placeholder="seu@email.com" required class="input" />
                    <!-- type="email" valida formato automaticamente -->
                    <!-- required impede envio vazio -->
                </div>

                <!-- CAMPO SENHA -->
                <div class="campoSenha">
                    <label for="senha" class="label">Senha</label>

                    <!-- Wrapper para posicionar o botão do olho -->
                    <div class="inputWrapper">
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required
                            class="input" />
                        <!-- type="password" oculta caracteres -->

                        <!-- BOTÃO MOSTRAR / OCULTAR SENHA -->
                        <button type="button" class="eyeBtn">
                            <!-- type="button" evita envio do formulário -->

                            <!-- Ícone olho aberto -->
                            <span class="olhoAberto">
                                <!-- SVG embutido do ícone -->
                                <!-- Aparece quando senha está visível -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                    fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                    <path
                                        d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z" />
                                    <path
                                        d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0" />
                                </svg>
                            </span>

                            <!-- Ícone olho fechado -->
                            <span class="olhoFechado">
                                <!-- SVG embutido do ícone -->
                                <!-- Aparece quando senha está oculta -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                    fill="currentColor" class="bi bi-eye-slash" viewBox="0 0 16 16">
                                    <path
                                        d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z" />
                                    <path
                                        d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829" />
                                    <path
                                        d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z" />
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <!-- LINK DE RECUPERAÇÃO DE SENHA -->
                <a href="#" class="recuperarSenha">Esqueci minha senha</a>

                <!-- BOTÃO DE ENVIO DO FORMULÁRIO -->
                <button type="submit" class="btnEntrar">Entrar</button>
            </form>

            <!-- BLOCO PARA CRIAR CONTA -->
            <div class="criarConta">
                <p>Não tem uma conta?</p>
                <a href="./cadastro.html">Criar uma conta</a>
                <!-- Redireciona para página de cadastro -->
            </div>
        </div>
    </main>
</body>
<script src="./src/js/login.js"></script>
</html>
